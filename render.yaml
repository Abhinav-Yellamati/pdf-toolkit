services:
  - type: web
    name: pdf-toolkit-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: LOG_LEVEL
        value: INFO
      - key: ENABLE_DOCS
        value: "1"
      - key: MAX_FILE_MB
        value: "100"
      - key: CORS_ORIGINS
        value: https://pdf-toolkit-black-ten.vercel.app
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
